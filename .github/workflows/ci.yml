name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Dependency audit
        run: pip-audit -r requirements.txt

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t attackpathgraph:ci .
      - name: Run container
        run: |
          docker run -d --name attackpathgraph \
            -e ATTACKPATHGRAPH_AUTH_USERNAME=ci \
            -e ATTACKPATHGRAPH_AUTH_PASSWORD=ci-test-password \
            -p 5000:5000 attackpathgraph:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:5000/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs attackpathgraph
          exit 1
