services:
  attackpathgraph:
    build: .
    ports:
      - "5000:5000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: attackpathgraph-dev
      ATTACKPATHGRAPH_ENABLE_NEO4J_EXPORT: "true"
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/attackpathgraph-dev
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
