services:
  attackpathgraph:
    build: .
    ports:
      - "127.0.0.1:${ATTACKPATHGRAPH_PORT:-5000}:5000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
      ATTACKPATHGRAPH_AUTH_USERNAME: ${ATTACKPATHGRAPH_AUTH_USERNAME:?Set ATTACKPATHGRAPH_AUTH_USERNAME}
      ATTACKPATHGRAPH_AUTH_PASSWORD: ${ATTACKPATHGRAPH_AUTH_PASSWORD:?Set ATTACKPATHGRAPH_AUTH_PASSWORD}
      ATTACKPATHGRAPH_ENABLE_NEO4J_EXPORT: ${ATTACKPATHGRAPH_ENABLE_NEO4J_EXPORT:-false}
      ATTACKPATHGRAPH_HTTPS_ONLY: ${ATTACKPATHGRAPH_HTTPS_ONLY:-false}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  neo4j:
    image: neo4j:5-community
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1;' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  neo4j_data:
